<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الصفحة الرئيسية</title>
    <!-- رابط مكتبة Font Awesome للأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script>
    (function() {
        var script = document.createElement('script');
        script.dataset.bot = "67efdf4952a7f4420379e37e";
        script.dataset.zindex = "99999";
        script.src = "https://panel.chatfuel.com/widgets/chat-widget/chat-widget.js";
        script.async = true;
        script.defer = true;
        document.getElementsByTagName('head')[0].appendChild(script);
    })()
    </script>
    <style>
        /* أنماط عامة */
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* خلفية متحركة */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(-45deg, #000000, #1a1a2e, #16213e, #0f3460);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        /* جزيئات متحركة */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background-color: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: float 15s infinite linear;
        }

        @keyframes float {
            0% {
                transform: translateY(0) translateX(0);
                opacity: 1;
            }
            100% {
                transform: translateY(-1000px) translateX(500px);
                opacity: 0;
            }
        }

        /* نافذة الاختيار */
        .modal {
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 1000;
        }

        .modal-content {
            background-color: #222;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.5);
        }

        .modal-content h2 {
            margin-bottom: 20px;
            color: #4CAF50;
        }

        .modal-content button {
            margin: 10px;
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-content button.yes {
            background-color: #4CAF50;
            color: #fff;
        }

        .modal-content button.no {
            background-color: #f44336;
            color: #fff;
        }

        .modal-content button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        /* إخفاء النافذة بعد الاختيار */
        .modal.hidden {
            display: none;
        }

        /* بقية الأنماط */
        .profile-container {
            margin-top: 20px;
            text-align: center;
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-pic {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            overflow: hidden;
            border: 5px solid #4CAF50;
            margin: 0 auto;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.5);
            transition: transform 0.3s ease;
        }

        .profile-pic:hover {
            transform: scale(1.05);
        }

        .profile-pic img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .about-me {
            margin-top: 20px;
            font-size: 18px;
            color: #fff;
            text-decoration: none;
            border: 2px solid #4CAF50;
            padding: 10px 20px;
            border-radius: 25px;
            transition: all 0.3s ease;
            cursor: pointer;
            background-color: rgba(0, 0, 0, 0.3);
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.3);
        }

        .about-me:hover {
            background-color: #4CAF50;
            color: #000;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.8);
        }

        /* صندوق الأيقونات */
        .social-box {
            position: fixed;
            bottom: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .social-box .toggle-button {
            background-color: rgba(34, 34, 34, 0.7);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .social-box .toggle-button i {
            font-size: 24px;
            color: #fff;
        }

        .social-box .toggle-button:hover {
            background-color: rgba(68, 68, 68, 0.7);
            transform: scale(1.1);
        }

        .social-icons {
            display: none;
            flex-direction: column;
            gap: 15px;
            background-color: rgba(34, 34, 34, 0.7);
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
        }

        .social-icons a {
            text-decoration: none;
            color: #888;
            font-size: 30px;
            transition: all 0.3s ease;
        }

        .social-icons a:hover {
            color: #1DA1F2;
            transform: scale(1.2);
        }

        .social-box.active .social-icons {
            display: flex;
            animation: fadeIn 0.5s ease;
        }

        /* زر التحكم في الصوت */
        .music-control {
            background-color: rgba(34, 34, 34, 0.7);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .music-control i {
            font-size: 24px;
            color: #fff;
        }

        .music-control:hover {
            background-color: rgba(68, 68, 68, 0.7);
            transform: scale(1.1);
        }

        /* صفحة About Me */
        .about-content {
            display: none;
            text-align: center;
            max-width: 600px;
            padding: 40px;
            border-radius: 15px;
            background: linear-gradient(135deg, rgba(10, 25, 47, 0.8), rgba(26, 54, 95, 0.8));
            color: #fff;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            animation: fadeIn 1s ease;
            margin: 20px;
        }

        .about-content h1 {
            font-family: 'Georgia', serif;
            font-size: 36px;
            margin-bottom: 20px;
            color: #4CAF50;
            text-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
        }

        .about-content p {
            font-family: 'Arial', sans-serif;
            font-size: 18px;
            line-height: 1.8;
            margin: 15px 0;
            color: #e0e0e0;
        }

        .back-link {
            margin-top: 20px;
            font-size: 18px;
            color: #4CAF50;
            text-decoration: none;
            border: 2px solid #4CAF50;
            padding: 10px 20px;
            border-radius: 25px;
            transition: all 0.3s ease;
            cursor: pointer;
            background-color: rgba(0, 0, 0, 0.3);
        }

        .back-link:hover {
            background-color: #4CAF50;
            color: #000;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.8);
        }

        /* أداة الدردشة الجديدة */
        .chat-widget-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 999;
        }

        .chat-toggle-button {
            background-color: #4CAF50;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .chat-toggle-button i {
            font-size: 24px;
            color: white;
        }

        .chat-toggle-button:hover {
            transform: scale(1.1);
            background-color: #45a049;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.8);
        }
    </style>
</head>
<body>
    <!-- خلفية متحركة -->
    <div class="bg-animation"></div>
    <div class="particles" id="particles"></div>

    <!-- نافذة الاختيار -->
    <div class="modal" id="choiceModal">
        <div class="modal-content">
            <h2>هل تريد تشغيل الموسيقى؟</h2>
            <button class="yes" onclick="playMusic()">نعم</button>
            <button class="no" onclick="closeModal()">لا</button>
        </div>
    </div>

    <!-- الصفحة الرئيسية -->
    <div id="home-page">
        <div class="profile-container">
            <div class="profile-pic">
                <img src="https://imgur.com/YzGnCAC.jpg" alt="Profile Picture">
            </div>
            <div class="about-me" onclick="showAboutPage()">About Me</div>
        </div>

        <!-- صندوق الأيقونات وزر التحكم في الصوت -->
        <div class="social-box">
            <!-- زر التحكم في الصوت -->
            <div class="music-control" id="musicControl" onclick="toggleMusic()">
                <i class="fas fa-play" id="musicIcon"></i>
            </div>

            <!-- زر التبديل للأيقونات -->
            <div class="toggle-button" onclick="toggleSocialIcons()">
                <i class="fas fa-share-alt"></i>
            </div>

            <!-- أيقونات التواصل الاجتماعي -->
            <div class="social-icons">
                <a href="https://t.me/iic404" target="_blank">
                    <i class="fab fa-telegram"></i>
                </a>
                <a href="https://www.instagram.com/_xnec?igsh=MWkzOW8yMW5hcjl4YQ%3D%3D&utm_source=qr" target="_blank">
                    <i class="fab fa-instagram"></i>
                </a>
                <a href="https://www.tiktok.com/@ut3pp?_t=ZS-8u05kh04VCi&_r=1" target="_blank">
                    <i class="fab fa-tiktok"></i>
                </a>
            </div>
        </div>
    </div>

    <!-- صفحة About Me -->
    <div id="about-page" class="about-content">
        <h1>About Me</h1>
        <p>Na- Sajad Jawad</p>
        <p>Co- Iraq 🇮🇶</p>
        <p>Cty- Basra</p>
        <p>Age- 24</p>
        <p>Programmer Languages</p>
        <p>Connect with me on the social media platforms on the home page.</p>
        <div class="back-link" onclick="showHomePage()">العودة إلى الصفحة الرئيسية</div>
    </div>

    <!-- عنصر الصوت -->
    <audio id="backgroundMusic" src="https://od.lk/s/NjNfNzM4NTc5Nzhf/WesGhost%20-%20DARK%20%281%29.mp3" loop></audio>

    <!-- أداة الدردشة الجديدة -->
    <div class="chat-widget-container">
        <div class="chat-toggle-button" onclick="toggleChatWidget()">
            <i class="fas fa-comment-dots"></i>
        </div>
    </div>
    <script src="https://chatthing.ai/chat-widget.js" type="text/javascript" id="dc86f954-9e25-4874-bd4d-1b774b877062" async defer></script>

    <script>
        // إنشاء جزيئات متحركة
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 50;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                // وضع عشوائي للجزيئات
                particle.style.left = Math.random() * 100 + 'vw';
                particle.style.top = Math.random() * 100 + 'vh';
                
                // أحجام مختلفة
                const size = Math.random() * 3 + 1;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                
                // شفافية مختلفة
                particle.style.opacity = Math.random() * 0.7 + 0.3;
                
                // سرعات مختلفة
                const duration = Math.random() * 20 + 10;
                particle.style.animationDuration = duration + 's';
                
                particlesContainer.appendChild(particle);
            }
        }

        // عرض نافذة الاختيار عند فتح الموقع
        document.addEventListener("DOMContentLoaded", function () {
            document.getElementById("choiceModal").classList.remove("hidden");
            createParticles();
        });

        // تشغيل الموسيقى وإخفاء النافذة
        function playMusic() {
            const audio = document.getElementById("backgroundMusic");
            audio.play();
            closeModal();
            // تغيير الأيقونة إلى "إيقاف"
            document.getElementById("musicIcon").classList.remove("fa-play");
            document.getElementById("musicIcon").classList.add("fa-pause");
        }

        // إخفاء النافذة
        function closeModal() {
            document.getElementById("choiceModal").classList.add("hidden");
        }

        // وظائف تبديل الصفحات
        function showAboutPage() {
            document.getElementById("home-page").style.display = "none";
            document.getElementById("about-page").style.display = "block";
        }

        function showHomePage() {
            document.getElementById("about-page").style.display = "none";
            document.getElementById("home-page").style.display = "block";
        }

        // تبديل ظهور الأيقونات
        function toggleSocialIcons() {
            const socialBox = document.querySelector(".social-box");
            socialBox.classList.toggle("active");
        }

        // التحكم في تشغيل وإيقاف الموسيقى
        function toggleMusic() {
            const audio = document.getElementById("backgroundMusic");
            const musicIcon = document.getElementById("musicIcon");

            if (audio.paused) {
                audio.play();
                musicIcon.classList.remove("fa-play");
                musicIcon.classList.add("fa-pause");
            } else {
                audio.pause();
                musicIcon.classList.remove("fa-pause");
                musicIcon.classList.add("fa-play");
            }
        }

        // تبديل أداة الدردشة
        function toggleChatWidget() {
            // هذه الوظيفة تعتمد على كيفية عمل أداة الدردشة
            // قد تحتاج إلى تعديلها حسب وثائق الأداة
            if (window.ChatThingAI && window.ChatThingAI.toggle) {
                window.ChatThingAI.toggle();
            }
        }
    </script>
    <script>
    (function() {
        var script = document.createElement('script');
        script.dataset.bot = "67efdf4952a7f4420379e37e";
        script.dataset.zindex = "99999";
        script.src = "https://panel.chatfuel.com/widgets/chat-widget/chat-widget.js";
        script.async = true;
        script.defer = true;
        document.getElementsByTagName('head')[0].appendChild(script);
    })()
    </script>
</body>
</html>
